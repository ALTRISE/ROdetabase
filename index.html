<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RO アイテムデータベース</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></scr\ipt>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></scr\ipt>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Shippori+Mincho:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

/* ===== ダークモード(デフォルト) ===== */
:root,[data-theme="dark"]{
  --bg:#120b06;--bg2:#1e1108;--bg3:#261507;--bg4:#341c0c;
  --panel:#261507;--border:#6b4420;
  --kafra:#9c2f2a;--kafra-h:#c43d36;--gold:#c8a84b;
  --parch:#f3e5c2;--parch-d:#e2cd9a;--parch-dd:#d4bb82;
  --ink:#2a1c10;--ink-s:#6b5640;--ink-dim:#9a7c5a;
  --label:#e2cd9a;--label-dim:#9a7c5a;
  --ok:#2f5f3a;--ok-bg:#dcebe2;--err:#7a221e;--err-bg:#f3d9d6;
  --row-even:rgba(255,255,255,.02);--row-hover:rgba(156,47,42,.2);--row-sel:rgba(156,47,42,.4);
  --ether-l:#3f7d8f;
  --wood-deep:#2b1810;--wood-mid:#5c3a22;--wood-light:#8a5a35;
  --body-bg:radial-gradient(ellipse at 30% -10%,#4a2f1a 0%,#1b1008 55%,#120b06 100%);
  --th-bg:#341c0c;--th-hover:#4a2810;--tab-bg:#1e1108;
  --stat-bg:#261507;--text-box-bg:#261507;
  --scroll-track:#1a0e06;--scroll-thumb:#5c3a22;
}
/* ===== ライトモード ===== */
[data-theme="light"]{
  --bg:#f5ede0;--bg2:#ede0cc;--bg3:#e4d0b4;--bg4:#d8c09a;
  --panel:#ede0cc;--border:#c8a070;
  --kafra:#9c2f2a;--kafra-h:#c43d36;--gold:#8a5a18;
  --parch:#2a1c10;--parch-d:#3d2a18;--parch-dd:#5a3a20;
  --ink:#f3e5c2;--ink-s:#e2cd9a;--ink-dim:#c8a870;
  --label:#2a1c10;--label-dim:#6b5640;
  --ok:#1e4a28;--ok-bg:#c8e8d4;--err:#6a1a16;--err-bg:#f0d0cc;
  --row-even:rgba(0,0,0,.03);--row-hover:rgba(156,47,42,.12);--row-sel:rgba(156,47,42,.25);
  --ether-l:#2f6a7a;
  --wood-deep:#c8a870;--wood-mid:#d8b880;--wood-light:#e8c890;
  --body-bg:linear-gradient(135deg,#f5ede0 0%,#ede0cc 100%);
  --th-bg:#d8c09a;--th-hover:#c8a870;--tab-bg:#e4d0b4;
  --stat-bg:#ede0cc;--text-box-bg:#e8dac8;
  --scroll-track:#e0d0b8;--scroll-thumb:#c8a070;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Shippori Mincho',serif;color:var(--label);background:var(--body-bg);min-height:100vh;transition:background .3s;}
.mono{font-family:'JetBrains Mono',monospace;}

#app{display:flex;flex-direction:column;height:100vh;}
#titlebar{background:var(--kafra);color:#fbeee4;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0;}
#titlebar h1{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.05em;}
.title-btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#theme-btn{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;background:rgba(255,255,255,.18);color:#fbeee4;font-size:.82rem;font-weight:600;font-family:inherit;white-space:nowrap;}
#theme-btn:hover{background:rgba(255,255,255,.28);}

#tabs{display:flex;background:var(--tab-bg);flex-shrink:0;border-bottom:2px solid var(--border);transition:background .3s;}
.tab{padding:10px 20px;color:var(--label-dim);cursor:pointer;font-size:.85rem;font-weight:600;border-bottom:3px solid transparent;transition:all .15s;}
.tab:hover{color:var(--label);}
.tab.active{color:var(--label);border-bottom-color:var(--kafra);}

#main{flex:1;overflow:hidden;display:flex;}

/* サイドバー */
#tab-list{display:flex;width:100%;height:100%;overflow:hidden;}
#sidebar{width:220px;flex-shrink:0;background:var(--panel);overflow-y:auto;padding:12px;border-right:1px solid var(--border);transition:background .3s;}
#sidebar h3{color:var(--gold);font-size:.8rem;margin-bottom:10px;font-family:'Cinzel',serif;letter-spacing:.1em;}
.filter-group{margin-bottom:14px;}
.filter-group label{display:block;color:var(--label-dim);font-size:.75rem;margin-bottom:4px;}
.filter-group input,.filter-group select{width:100%;padding:6px 8px;border-radius:5px;font-size:.8rem;font-family:inherit;background:var(--bg3);border:1px solid var(--border);color:var(--label);}
.lv-range{display:flex;align-items:center;gap:4px;}
.lv-range input{width:60px;}
.lv-range span{color:var(--label-dim);font-size:.8rem;}
#reset-btn{width:100%;padding:7px;border:none;border-radius:5px;cursor:pointer;background:var(--bg4);color:var(--label);font-size:.8rem;font-weight:600;font-family:inherit;margin-top:4px;}
#reset-btn:hover{background:var(--border);}
#item-count{text-align:center;color:var(--label-dim);font-size:.75rem;margin-top:10px;}

/* リスト */
#list-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#search-bar{padding:8px 12px;background:var(--tab-bg);display:flex;gap:8px;align-items:center;border-bottom:1px solid var(--border);transition:background .3s;}
#search-bar input{flex:1;padding:7px 12px;border-radius:6px;font-size:.85rem;font-family:inherit;background:var(--bg3);border:1px solid var(--border);color:var(--label);}
.sort-row{display:flex;align-items:center;gap:8px;background:var(--tab-bg);padding:5px 12px;border-bottom:1px solid var(--border);transition:background .3s;}
.sort-row label{color:var(--label-dim);font-size:.75rem;}
.sort-row select{padding:4px 6px;border-radius:4px;font-size:.75rem;font-family:inherit;background:var(--bg3);border:1px solid var(--border);color:var(--label);}
#sort-dir-btn{padding:4px 8px;border:none;border-radius:4px;cursor:pointer;background:var(--bg4);color:var(--label);font-size:.75rem;}

/* テーブル */
#table-wrap{flex:1;overflow:auto;}
#item-table{width:100%;border-collapse:collapse;font-size:.82rem;}
#item-table thead th{background:var(--th-bg);color:var(--gold);padding:8px 10px;text-align:left;white-space:nowrap;cursor:pointer;user-select:none;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:1;}
#item-table thead th:hover{background:var(--th-hover);}
#item-table thead th.num{text-align:right;}
#item-table tbody tr{cursor:pointer;transition:background .1s;}
#item-table tbody tr:nth-child(even){background:var(--row-even);}
#item-table tbody tr:hover{background:var(--row-hover);}
#item-table tbody tr.selected{background:var(--row-sel);}
#item-table td{padding:7px 10px;color:var(--label);border-bottom:1px solid var(--border);}
#item-table td.num{text-align:right;font-family:'JetBrains Mono',monospace;font-size:.78rem;}
#item-table td.name-cell{font-weight:600;}
.type-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.7rem;font-weight:700;white-space:nowrap;}
.slot-pip{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:2px;}
.slot-pip.on{background:var(--ether-l);}
.slot-pip.off{background:var(--border);}

/* 詳細 */
#tab-detail{width:100%;overflow-y:auto;padding:16px;background:var(--bg);transition:background .3s;}
#detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--label-dim);font-size:.9rem;}
#detail-content{display:none;max-width:860px;margin:0 auto;}
#detail-header-inner{background:var(--bg3);border-radius:10px;padding:16px 18px;border:1px solid var(--border);margin-bottom:14px;}
#detail-name{font-size:1.4rem;font-weight:700;margin-bottom:4px;color:var(--label);}
#detail-subtype{color:var(--label-dim);font-size:.85rem;}
#detail-body{display:grid;grid-template-columns:220px 1fr;gap:14px;}
#stat-panel{background:var(--stat-bg);border-radius:10px;padding:14px;border:1px solid var(--border);}
#stat-panel h3{color:var(--gold);font-size:.8rem;font-family:'Cinzel',serif;margin-bottom:10px;letter-spacing:.1em;}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:5px 0;border-bottom:1px solid var(--border);}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--label-dim);font-size:.78rem;}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:.85rem;color:var(--label);font-weight:600;}
#text-panel{display:flex;flex-direction:column;gap:10px;}
.text-section h3{color:var(--gold);font-size:.8rem;font-family:'Cinzel',serif;margin-bottom:6px;letter-spacing:.1em;}
.text-box{background:var(--text-box-bg);border-radius:8px;padding:12px;color:var(--label);font-size:.85rem;line-height:1.7;border:1px solid var(--border);min-height:40px;white-space:pre-wrap;}

/* 変換タブ */
#tab-convert{width:100%;overflow-y:auto;padding:16px;background:var(--bg);transition:background .3s;}
.conv-section{max-width:700px;margin:0 auto 16px;}
.wood-card{background:linear-gradient(155deg,var(--wood-light),var(--wood-mid) 45%,var(--wood-deep));padding:2px;border-radius:12px;}
.wood-card-inner{background:var(--bg3);border-radius:10px;padding:16px;}
.conv-section h2{font-size:.95rem;font-weight:700;margin-bottom:4px;color:var(--label);display:flex;align-items:center;gap:6px;}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--kafra);color:#fbeee4;font-size:.72rem;font-weight:700;}
.conv-section p{font-size:.8rem;color:var(--label-dim);margin-bottom:10px;line-height:1.6;}
.conv-section input[type=file]{width:100%;padding:8px;border-radius:5px;font-size:.8rem;background:var(--bg4);border:1px solid var(--border);color:var(--label);}
.dl-btns{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
.conv-status{margin-top:8px;padding:7px 10px;border-radius:5px;font-size:.78rem;display:none;}
.conv-status.ok{background:var(--ok-bg);color:var(--ok);display:block;}
.conv-status.err{background:var(--err-bg);color:var(--err);display:block;}

/* プログレスバー */
.prog-wrap{display:none;margin-top:10px;}
.prog-wrap.show{display:block;}
.prog-label-row{font-size:.75rem;color:var(--label-dim);margin-bottom:4px;display:flex;justify-content:space-between;}
.prog-track{background:var(--bg4);border-radius:99px;height:10px;overflow:hidden;border:1px solid var(--border);}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--kafra),var(--kafra-h));border-radius:99px;width:0%;transition:width .25s ease;}
.prog-step{font-size:.72rem;color:var(--label-dim);margin-top:4px;min-height:1em;}

/* ボタン */
.btn{padding:7px 14px;border:none;border-radius:5px;cursor:pointer;font-family:inherit;font-size:.8rem;font-weight:600;transition:background .15s;}
.btn-primary{background:var(--kafra);color:#fbeee4;}
.btn-primary:hover{background:var(--kafra-h);}
.btn-secondary{background:var(--bg4);color:var(--label);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--border);}
.btn:disabled{opacity:.45;cursor:not-allowed;}

#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--label-dim);text-align:center;height:100%;}
#empty-state .icon{font-size:3rem;margin-bottom:12px;opacity:.5;}
#empty-state p{font-size:.85rem;line-height:1.7;max-width:360px;}

#statusbar{background:var(--tab-bg);color:var(--label-dim);padding:4px 14px;font-size:.72rem;flex-shrink:0;border-top:1px solid var(--border);}

::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--scroll-track);}
::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:3px;}

@media(max-width:640px){#sidebar{display:none;}#detail-body{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app">

<div id="titlebar">
  <div>
    <div style="font-family:'Cinzel',serif;letter-spacing:.16em;font-size:.6rem;text-transform:uppercase;color:rgba(251,238,228,.6)">RAGNAROK ONLINE</div>
    <h1>&#9876; アイテムデータベース</h1>
  </div>
  <div class="title-btns">
    <span id="db-filename" style="font-size:.72rem;opacity:.7;"></span>
    <button id="theme-btn" onclick="toggleTheme()">&#9728; ライトモード</button>
    <button class="btn btn-primary" onclick="document.getElementById('file-open').click()">&#128194; DBを開く</button>
    <input type="file" id="file-open" accept=".csv,.json" style="display:none" onchange="loadDatabase(this.files[0])">
  </div>
</div>

<div id="tabs">
  <div class="tab active" onclick="switchTab('list')">&#128203; アイテム一覧</div>
  <div class="tab" onclick="switchTab('detail')">&#128269; 詳細</div>
  <div class="tab" onclick="switchTab('convert')">&#128260; 変換ツール</div>
</div>

<div id="main">

  <div id="tab-list">
    <div id="sidebar">
      <h3>絞り込み</h3>
      <div class="filter-group">
        <label>種別</label>
        <select id="f-type" onchange="applyFilter()"><option value="">すべて</option></select>
      </div>
      <div class="filter-group">
        <label>必要Lv</label>
        <div class="lv-range">
          <input type="number" id="f-lv-min" placeholder="下限" min="0" oninput="applyFilter()">
          <span>〜</span>
          <input type="number" id="f-lv-max" placeholder="上限" min="0" oninput="applyFilter()">
        </div>
      </div>
      <div class="filter-group">
        <label>カード数(スロット)</label>
        <select id="f-slots" onchange="applyFilter()">
          <option value="">すべて</option><option>0</option><option>1</option><option>2</option><option>3</option><option>4</option>
        </select>
      </div>
      <div class="filter-group">
        <label>職業(部分一致)</label>
        <input type="text" id="f-job" placeholder="例: ナイト" oninput="applyFilter()">
      </div>
      <button id="reset-btn" onclick="resetFilter()">絞り込みをリセット</button>
      <div id="item-count">0 件</div>
    </div>
    <div id="list-area">
      <div id="search-bar">
        <input type="text" id="search-input" placeholder="&#128269; 名前・効果でキーワード検索" oninput="applyFilter()">
      </div>
      <div class="sort-row">
        <label>並び順:</label>
        <select id="sort-key" onchange="applyFilter()">
          <option value="name">名前</option><option value="reqLevel">必要Lv</option>
          <option value="atk">ATK</option><option value="def">DEF</option>
          <option value="weight">重量</option><option value="slots">カード数</option>
        </select>
        <button id="sort-dir-btn" onclick="toggleSortDir()">&#8593; 昇順</button>
      </div>
      <div id="table-wrap">
        <div id="empty-state">
          <div class="icon">&#9876;</div>
          <p>右上の「DBを開く」からCSV/JSONを読み込むか、変換ツールタブでワンクリック取得してください。</p>
        </div>
        <table id="item-table" style="display:none">
          <thead><tr>
            <th onclick="clickSort('id')">ID</th>
            <th onclick="clickSort('name')">名前</th>
            <th onclick="clickSort('type')">種別</th>
            <th onclick="clickSort('subtype')">詳細種別</th>
            <th class="num" onclick="clickSort('atk')">ATK</th>
            <th class="num" onclick="clickSort('matk')">MATK</th>
            <th class="num" onclick="clickSort('def')">DEF</th>
            <th class="num" onclick="clickSort('reqLevel')">必要Lv</th>
            <th class="num" onclick="clickSort('weaponLevel')">武器Lv</th>
            <th onclick="clickSort('slots')">Slot</th>
            <th class="num" onclick="clickSort('weight')">重量</th>
          </tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-detail" style="display:none">
    <div id="detail-empty">アイテム一覧でアイテムをクリックすると詳細が表示されます</div>
    <div id="detail-content">
      <div id="detail-header-inner">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div><div id="detail-name">&#8212;</div><div id="detail-subtype"></div></div>
          <div id="detail-type-badge"></div>
        </div>
      </div>
      <div id="detail-body">
        <div id="stat-panel">
          <h3>STATS</h3>
          <div id="stat-rows"></div>
        </div>
        <div id="text-panel">
          <div class="text-section"><h3>EFFECT / 効果</h3><div class="text-box" id="d-effect">&#8212;</div></div>
          <div class="text-section"><h3>SET EFFECT / セット効果</h3><div class="text-box" id="d-set">&#8212;</div></div>
          <div class="text-section"><h3>LOCATION / 入手場所</h3><div class="text-box" id="d-location">&#8212;</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="tab-convert" style="display:none">
    <div class="conv-section">
      <div style="background:linear-gradient(135deg,var(--kafra),#5a1a18);padding:2px;border-radius:12px;">
        <div style="background:var(--bg3);border-radius:10px;padding:18px;">
          <h2 style="color:var(--label);font-size:1rem;margin-bottom:6px;">&#9889; ワンクリックで数値データを取得</h2>
          <p style="font-size:.8rem;color:var(--gold);margin-bottom:12px;line-height:1.6;">
            rAthena GitHub から ATK・DEF・必要Lv・職業制限・カード数などをダウンロードします。<br>
            <strong style="color:var(--label);">ファイル準備不要・ボタン1つだけ！</strong>
            （名前は英語。日本語にしたい場合は下の手順①〜③を使ってください）
          </p>
          <button class="btn btn-primary" id="auto-dl-btn" onclick="autoDownloadRathena()" style="font-size:.9rem;padding:10px 20px;">
            &#9654; rAthenaデータを自動ダウンロードしてDBを開く
          </button>
          <div class="prog-wrap" id="pw1" style="margin-top:12px;">
            <div class="prog-label-row"><span id="pt1">準備中…</span><span id="pp1">0%</span></div>
            <div class="prog-track"><div class="prog-bar" id="pb1"></div></div>
            <div class="prog-step" id="ps1"></div>
          </div>
          <div class="conv-status" id="status-auto"></div>
        </div>
      </div>
    </div>

    <div style="text-align:center;color:var(--label-dim);font-size:.78rem;margin:-4px 0 8px;max-width:700px;margin-left:auto;margin-right:auto;">
      ── 日本語名・効果文も欲しい場合は以下の手順①〜③を使ってください ──
    </div>

    <div class="conv-section">
      <div class="wood-card"><div class="wood-card-inner">
        <h2><span class="step-num">&#9312;</span> iteminfo.lua &#x2192; 日本語名・効果文</h2>
        <p>GRF Editor の「Lub Decompiler」で書き出した iteminfo.lua / .txt を選んでください。</p>
        <input type="file" id="conv-lua" accept=".lua,.txt" onchange="convertLua(this.files[0])">
        <div class="dl-btns">
          <button class="btn btn-primary" id="dl-lua-csv" disabled onclick="downloadFile('lua-csv')">CSVをDL</button>
          <button class="btn btn-secondary" id="dl-lua-json" disabled onclick="downloadFile('lua-json')">JSONをDL</button>
          <button class="btn btn-secondary" id="load-lua-db" disabled onclick="loadConvertedData('lua')">&#128203; DBに読み込む</button>
        </div>
        <div class="conv-status" id="status-lua"></div>
      </div></div>
    </div>

    <div class="conv-section">
      <div class="wood-card"><div class="wood-card-inner">
        <h2><span class="step-num">&#9313;</span> item_db_equip.yml &#x2192; 数値データ</h2>
        <p>rAthena の item_db_equip.yml を選ぶか、下のボタンで自動ダウンロードできます。</p>
        <div class="dl-btns" style="margin-bottom:8px">
          <button class="btn btn-primary" id="yml-auto-btn" onclick="autoDownloadYmlOnly()">&#11015; GitHubから自動DL</button>
        </div>
        <div class="prog-wrap" id="pw2">
          <div class="prog-label-row"><span id="pt2">準備中…</span><span id="pp2">0%</span></div>
          <div class="prog-track"><div class="prog-bar" id="pb2"></div></div>
          <div class="prog-step" id="ps2"></div>
        </div>
        <input type="file" id="conv-yml" accept=".yml,.yaml" multiple onchange="convertYml(this.files)">
        <div class="dl-btns">
          <button class="btn btn-primary" id="dl-yml-csv" disabled onclick="downloadFile('yml-csv')">CSVをDL</button>
          <button class="btn btn-secondary" id="dl-yml-json" disabled onclick="downloadFile('yml-json')">JSONをDL</button>
          <button class="btn btn-secondary" id="load-yml-db" disabled onclick="loadConvertedData('yml')">&#128203; DBに読み込む</button>
        </div>
        <div class="conv-status" id="status-yml"></div>
      </div></div>
    </div>

    <div class="conv-section">
      <div class="wood-card"><div class="wood-card-inner">
        <h2><span class="step-num">&#9314;</span> ①と②を統合（日本語名 + 正確な数値）</h2>

/* rAthena自動DL */
const RURLS=[
  'https://raw.githubusercontent.com/rathena/rathena/master/db/re/item_db_equip.yml',
  'https://raw.githubusercontent.com/rathena/rathena/master/db/re/item_db_usable.yml'
];
const RLABELS=['装備品DB (item_db_equip.yml)','消耗品DB (item_db_usable.yml)'];

async function fetchWithProg(url,label,pid,s0,s1){
  setProg(pid,s0,'ダウンロード中…',label);
  const res=await fetch(url);
  if(!res.ok)throw new Error('ダウンロード失敗 ('+res.status+')');
  const total=parseInt(res.headers.get('content-length')||'0');
  const reader=res.body.getReader();
  const chunks=[];let loaded=0;
  while(true){
    const{done,value}=await reader.read();
    if(done)break;
    chunks.push(value);loaded+=value.length;
    const fp=total>0?s0+(loaded/total)*(s1-s0):s0+Math.min(.9,loaded/800000)*(s1-s0);
    const kb=Math.round(loaded/1024);
    const info=total>0?label+'  '+kb+'KB / '+Math.round(total/1024)+'KB':label+'  '+kb+'KB 受信中…';
    setProg(pid,fp,'ダウンロード中…',info);
  }
  setProg(pid,s1,'解析中…',label+' — 解析しています…');
  const buf=new Uint8Array(chunks.reduce((a,c)=>a+c.length,0));
  let pos=0;for(const c of chunks){buf.set(c,pos);pos+=c.length;}
  return new TextDecoder('utf-8').decode(buf);
}

async function runDL(pid){
  let all=[];
  const step=90/RURLS.length;
  for(let i=0;i<RURLS.length;i++){
    const txt=await fetchWithProg(RURLS[i],RLABELS[i],pid,i*step,(i+1)*step);
    setProg(pid,(i+1)*step,'変換中…',RLABELS[i]+' — 変換しています…');
    const parsed=jsyaml.load(txt);
    const body=(parsed&&(parsed.Body||parsed.body))||[];
    const items=convYmlBody(body);
    all=all.concat(items);
    setProg(pid,(i+1)*step+2,'変換完了',RLABELS[i]+' — '+items.length+'件変換');
  }
  return all;
}

const ALIAS={'id':'id','ID':'id','名前':'name','name':'name','種別':'type','type':'type',
  '詳細種別':'subtype','subtype':'subtype','ATK':'atk','atk':'atk','MATK':'matk','matk':'matk',
  'DEF':'def','def':'def','MDEF':'mdef','mdef':'mdef','重量':'weight','weight':'weight',
  '必要Lv':'reqLevel','reqLevel':'reqLevel','武器Lv':'weaponLevel','weaponLevel':'weaponLevel',
  '射程':'range','range':'range','職業制限':'job','job':'job','カード数':'slots','slots':'slots',
  '属性':'element','element':'element','効果':'effect','effect':'effect',
  '入手場所':'location','location':'location','セット効果':'setEffect','setEffect':'setEffect',
  '購入価格':'buy','buy':'buy','売却価格':'sell','sell':'sell',
  '装備部位':'equipLocation','equipLocation':'equipLocation',
  'データ元':'dataSource','dataSource':'dataSource','英語名':'aegisName','AegisName':'aegisName'};
function normRow(raw){const o={};for(const[k,v]of Object.entries(raw)){o[ALIAS[k.trim()]||k.trim()]=typeof v==='string'?v.trim():(v??'');}return o;}
async function loadDatabase(file){
  if(!file)return;
  try{
    const text=await file.text();let rows;
    if(file.name.toLowerCase().endsWith('.json')){rows=JSON.parse(text);if(!Array.isArray(rows))throw new Error('JSON配列形式にしてください');}
    else{rows=Papa.parse(text,{header:true,skipEmptyLines:true,transformHeader:h=>h.trim()}).data;}
    allItems=rows.map(normRow).filter(it=>it.name);
    document.getElementById('db-filename').textContent=file.name;
    updateTypeList();applyFilter();setStatus('読み込み完了: '+file.name+' ('+allItems.length+'件)');
  }catch(e){setStatus('読み込みエラー: '+e.message);alert('読み込みに失敗しました:\n'+e.message);}
}

function applyFilter(){

/* テーブル */

const TF=['#f5e9d6','#eaf3f5','#eef3e8','#f3e7ee','#fbf0dc','#e9edf3','#f7e8e0','#e7f5f1'];
function tc(t){let h=0;for(const c of(t||''))h=(h*31+c.charCodeAt(0))>>>0;return{bg:TC[h%8],fg:TF[h%8]};}
function pips(n){n=Math.max(0,Math.min(4,Math.round(parseFloat(n)||0)));return Array.from({length:4},(_,i)=>'<span class="slot-pip '+(i<n?'on':'off')+'"></span>').join('');}

/* 変換 */
const SP=[['atk',/^(?:Attack|ATK|攻撃力)\s*[:：]?\s*([\d,]+)/],['matk',/^(?:MATK|魔法攻撃力)\s*[:：]?\s*([\d,]+)/],
  ['def',/^(?:Defense|DEF|防御力)\s*[:：]?\s*([\d,]+)/],['weight',/^(?:Weight|重量)\s*[:：]?\s*([\d,.]+)/],
  ['reqLevel',/^(?:Required\s*Level|必要レベル|必要Lv)\s*[:：]?\s*(\d+)/],
  ['weaponLevel',/^(?:Weapon\s*Level|武器Lv)\s*[:：]?\s*(\d+)/],['range',/^(?:Range|射程)\s*[:：]?\s*(\d+)/],
  ['slots',/^(?:Slot|スロット数?|カード数)\s*[:：]?\s*(\d+)/],
  ['subtype',/^(?:Class|種別)\s*[:：]?\s*(.+)$/],['job',/^(?:Jobs?|職業)\s*[:：]?\s*(.+)$/]];
function uL(s){return s.replace(/\\"/g,'"').replace(/\\'/g,"'").replace(/\\\\/g,'\\').replace(/\\n/g,'\n');}
function fBlks(txt){
  const out=[],hr=/\[\s*(\d+)\s*\]\s*=\s*\{/g;let m;
  while((m=hr.exec(txt))!==null){
    const id=parseInt(m[1]);let d=0,ins=null,j=m.index+m[0].length-1,n=txt.length;
    while(j<n){const c=txt[j];if(ins){if(c==='\\'){j+=2;continue;}if(c===ins)ins=null;}
    else{if(c==='"'||c==="'")ins=c;else if(c==='{')d++;else if(c==='}'){d--;if(d===0){j++;break;}}}j++;}
    out.push([id,txt.slice(m.index+m[0].length-1,j)]);}
  return out;
}
function eStr(b,f){const m=new RegExp('(?<![A-Za-z])'+f+'\\s*=\\s*"((?:[^"\\\\]|\\\\.)*)"').exec(b);return m?uL(m[1]).trim():null;}
function eNum(b,f){const m=new RegExp('(?<![A-Za-z])'+f+'\\s*=\\s*(-?\\d+(?:\\.\\d+)?)').exec(b);return m?m[1]:null;}
function eLines(b,f){
  const m=new RegExp('(?<![A-Za-z])'+f+'\\s*=\\s*\\{').exec(b);if(!m)return[];
  let d=0,ins=null,j=m.index+m[0].length-1,n=b.length;
  while(j<n){const c=b[j];if(ins){if(c==='\\'){j+=2;continue;}if(c===ins)ins=null;}
  else{if(c==='"'||c==="'")ins=c;else if(c==='{')d++;else if(c==='}'){d--;if(d===0){j++;break;}}}j++;}
  const inner=b.slice(m.index+m[0].length-1,j),re=/"((?:[^"\\]|\\.)*)"/g,lines=[];let sm;
  while((sm=re.exec(inner))!==null)lines.push(uL(sm[1]).replace(/\^[0-9A-Fa-f]{6}/g,'').trim());
  return lines.filter(Boolean);
}
function pLua(txt){
  const items=[];
  for(const [id,blk] of fBlks(txt)){
    const name=eStr(blk,'identifiedDisplayName')||eStr(blk,'unidentifiedDisplayName');if(!name)continue;
    const sc=eNum(blk,'slotCount');
    const dls=eLines(blk,'identifiedDescriptionName').length?eLines(blk,'identifiedDescriptionName'):eLines(blk,'unidentifiedDescriptionName');
    const stats={},lft=[];
    for(const line of dls){
      let hit=false;
      for(const [k,p] of SP){if(k in stats)continue;const m=p.exec(line);if(m){stats[k]=m[1].trim().replace(/,/g,'');hit=true;break;}}
      if(!hit)lft.push(line);
    }
    const nv=k=>stats[k]!==undefined?Number(stats[k]):undefined;
    items.push({id,name,subtype:stats.subtype||'',atk:nv('atk'),matk:nv('matk'),def:nv('def'),
      weight:nv('weight'),reqLevel:nv('reqLevel'),weaponLevel:nv('weaponLevel'),range:nv('range'),
      job:stats.job||'',slots:stats.slots?Number(stats.slots):(sc?Number(sc):undefined),effect:lft.join(' / ')});
  }
  return items;
}
async function convertLua(file){
  if(!file)return;
  try{dataLua=pLua(await file.text());if(!dataLua.length)throw new Error('アイテムが見つかりませんでした');
    ['dl-lua-csv','dl-lua-json','load-lua-db'].forEach(id=>document.getElementById(id).disabled=false);
    showCS('lua',true,dataLua.length+'件を変換しました');
  }catch(e){showCS('lua',false,'変換失敗: '+e.message);}
}
function tKeys(obj){if(obj&&typeof obj==='object'&&!Array.isArray(obj))return Object.entries(obj).filter(([,v])=>v).map(([k])=>k).join(',');return typeof obj==='string'?obj:'';}
function convYmlBody(body){
  return(body||[]).filter(Boolean).map(it=>({
    id:it.Id,name:it.Name||it.AegisName||'',aegisName:it.AegisName||'',
    type:String(it.Type||''),detailType:it.SubType!=null?String(it.SubType):'',
    atk:it.Attack,matk:it.MagicAttack,def:it.Defense,weight:it.Weight,
    reqLevel:it.EquipLevelMin??it.EquipLv,weaponLevel:it.WeaponLevel,range:it.Range,
    job:tKeys(it.Jobs),slots:it.Slots,buy:it.Buy,sell:it.Sell,equipLocation:tKeys(it.Locations),
  }));
}
async function convertYml(files){
  if(!files||!files.length)return;
  try{
    let all=[];
    for(const f of Array.from(files)){const p=jsyaml.load(await f.text());all=all.concat(convYmlBody((p&&(p.Body||p.body))||[]));}
    if(!all.length)throw new Error('アイテムが見つかりませんでした');
    dataYml=all;['dl-yml-csv','dl-yml-json','load-yml-db'].forEach(id=>document.getElementById(id).disabled=false);
    showCS('yml',true,all.length+'件を変換しました');
  }catch(e){showCS('yml',false,'変換失敗: '+e.message);}
}
function fNE(...vs){for(const v of vs)if(v!==undefined&&v!==null&&v!=='')return v;return undefined;}
async function mergeData(){
  try{
    const ra=await rjson('conv-b-json')||dataYml;const tx=await rjson('conv-a-json')||dataLua;
    if(!ra&&!tx)throw new Error('①②のどちらかのデータが必要です');
    const rM=new Map((ra||[]).map(it=>[Number(it.id),it]));
    const tM=new Map((tx||[]).map(it=>[Number(it.id),it]));
    const ids=[...new Set([...rM.keys(),...tM.keys()])].sort((a,b)=>a-b);
    dataMerged=ids.map(id=>{const r=rM.get(id)||{},t=tM.get(id)||{};
      return{id,name:fNE(t.name,r.name)||'item-'+id,type:r.type||'',
        subtype:fNE(r.detailType,r.subtype,t.subtype)||'',
        atk:fNE(r.atk,t.atk),matk:fNE(r.matk,t.matk),def:fNE(r.def,t.def),
        weight:fNE(r.weight,t.weight),reqLevel:fNE(r.reqLevel,t.reqLevel),
        weaponLevel:fNE(r.weaponLevel,t.weaponLevel),range:fNE(r.range,t.range),
        job:fNE(r.job,t.job)||'',slots:fNE(r.slots,t.slots),buy:r.buy,sell:r.sell,effect:t.effect||'',
        dataSource:(rM.has(id)?'rathena':'')+(rM.has(id)&&tM.has(id)?'+':'')+(tM.has(id)?'text':''),};
    });
    dlD('merged_items.csv',toCSV(dataMerged),'text/csv');
    dlD('merged_items.json',JSON.stringify(dataMerged,null,2),'application/json');
    document.getElementById('load-merged-db').disabled=false;
    const both=dataMerged.filter(it=>it.dataSource==='rathena+text').length;
    showCS('merge',true,dataMerged.length+'件を統合しました(日本語+数値 両方: '+both+'件)');
  }catch(e){showCS('merge',false,'統合失敗: '+e.message);}
}
async function rjson(id){const f=document.getElementById(id).files[0];if(!f)return null;return JSON.parse(await f.text());}
function loadConvertedData(src){
  const d=src==='lua'?dataLua:src==='yml'?dataYml:dataMerged;
  if(!d)return;loadItemsIntoApp(d);
}
const CC=[['id','ID'],['name','名前'],['subtype','詳細種別'],['atk','ATK'],['matk','MATK'],['def','DEF'],['weight','重量'],
  ['reqLevel','必要Lv'],['weaponLevel','武器Lv'],['range','射程'],['job','職業制限'],['slots','カード数'],
  ['buy','購入価格'],['sell','売却価格'],['effect','効果'],['dataSource','データ元']];
function toCSV(items){return '\uFEFF'+Papa.unparse({fields:CC.map(c=>c[1]),data:items.map(it=>CC.map(([k])=>it[k]??''))});}
function downloadFile(t){
  if(t==='lua-csv')dlD('ro_items.csv',toCSV(dataLua),'text/csv');
  else if(t==='lua-json')dlD('ro_items.json',JSON.stringify(dataLua,null,2),'application/json');
  else if(t==='yml-csv')dlD('rathena_items.csv',toCSV(dataYml),'text/csv');
  else if(t==='yml-json')dlD('rathena_items.json',JSON.stringify(dataYml,null,2),'application/json');
}
function dlD(name,content,mime){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type:mime}));a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function showCS(id,ok,msg){const el=document.getElementById('status-'+id);el.className='conv-status '+(ok?'ok':'err');el.textContent=msg;}
function setStatus(msg){document.getElementById('statusbar').textContent=msg;}
</script>
